openapi: 3.0.3
info:
  title: TradingBot User Preferences API
  description: |
    API contract for managing user preferences in the TradingBot web application.

    **Note**: This API is for internal Blazor Server communication only.
    The application uses a single-user model with UserId = "default".
  version: 1.0.0
  contact:
    name: TradingBot Team

servers:
  - url: http://localhost:5000
    description: Local development server

tags:
  - name: preferences
    description: User preferences management

paths:
  /api/preferences:
    get:
      tags:
        - preferences
      summary: Get user preferences
      description: |
        Retrieves the current user's preferences. For single-user systems,
        this returns the preferences for UserId = "default".
      operationId: getPreferences
      responses:
        '200':
          description: Preferences retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '404':
          description: Preferences not found (should not occur - default preferences are seeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - preferences
      summary: Update user preferences
      description: |
        Updates the current user's preferences. Validates input ranges:
        - DashboardRefreshInterval: 1-300 seconds
        - NotificationDuration: 2-10 seconds
      operationId: updatePreferences
      requestBody:
        description: Updated preferences
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferencesUpdate'
      responses:
        '200':
          description: Preferences updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                errors:
                  - "Dashboard refresh interval must be between 1 and 300 seconds."
                  - "Notification duration must be between 2 and 10 seconds."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/preferences/reset:
    post:
      tags:
        - preferences
      summary: Reset preferences to defaults
      description: |
        Resets user preferences to default values:
        - Theme: Light
        - DashboardRefreshInterval: 5 seconds
        - NotificationDuration: 5 seconds
        - All notifications enabled
      operationId: resetPreferences
      responses:
        '200':
          description: Preferences reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    UserPreferences:
      type: object
      description: User preferences entity
      required:
        - id
        - userId
        - theme
        - dashboardRefreshInterval
        - notificationDuration
        - showSuccessNotifications
        - showErrorNotifications
        - showInfoNotifications
        - showWarningNotifications
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          description: Unique identifier
          example: 1
        userId:
          type: string
          description: User identifier (always "default" for single-user systems)
          example: "default"
        theme:
          type: string
          description: UI theme preference
          enum: [Light, Dark]
          example: "Dark"
        dashboardRefreshInterval:
          type: integer
          description: Dashboard auto-refresh interval in seconds
          minimum: 1
          maximum: 300
          example: 10
        notificationDuration:
          type: integer
          description: Toast notification display duration in seconds
          minimum: 2
          maximum: 10
          example: 5
        showSuccessNotifications:
          type: boolean
          description: Whether to show success toast notifications
          example: true
        showErrorNotifications:
          type: boolean
          description: Whether to show error toast notifications
          example: true
        showInfoNotifications:
          type: boolean
          description: Whether to show info toast notifications
          example: true
        showWarningNotifications:
          type: boolean
          description: Whether to show warning toast notifications
          example: true
        customSettings:
          type: string
          nullable: true
          description: JSON blob for extensible custom settings
          example: '{"chartType": "candlestick", "timezone": "America/New_York"}'
        createdAt:
          type: string
          format: date-time
          description: Record creation timestamp (ISO 8601)
          example: "2025-11-07T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp (ISO 8601)
          example: "2025-11-07T14:30:00Z"

    UserPreferencesUpdate:
      type: object
      description: Request payload for updating user preferences
      properties:
        theme:
          type: string
          description: UI theme preference
          enum: [Light, Dark]
          example: "Dark"
        dashboardRefreshInterval:
          type: integer
          description: Dashboard auto-refresh interval in seconds
          minimum: 1
          maximum: 300
          example: 10
        notificationDuration:
          type: integer
          description: Toast notification display duration in seconds
          minimum: 2
          maximum: 10
          example: 5
        showSuccessNotifications:
          type: boolean
          description: Whether to show success toast notifications
          example: true
        showErrorNotifications:
          type: boolean
          description: Whether to show error toast notifications
          example: true
        showInfoNotifications:
          type: boolean
          description: Whether to show info toast notifications
          example: false
        showWarningNotifications:
          type: boolean
          description: Whether to show warning toast notifications
          example: true
        customSettings:
          type: string
          nullable: true
          description: JSON blob for extensible custom settings
          example: '{"chartType": "line"}'

    ErrorResponse:
      type: object
      description: Generic error response
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
          example: "An unexpected error occurred."
        details:
          type: string
          nullable: true
          description: Additional error details (dev mode only)
          example: "NullReferenceException at UserPreferencesService.cs:42"

    ValidationErrorResponse:
      type: object
      description: Validation error response
      required:
        - errors
      properties:
        errors:
          type: array
          description: List of validation error messages
          items:
            type: string
          example:
            - "Dashboard refresh interval must be between 1 and 300 seconds."
            - "Notification duration must be between 2 and 10 seconds."